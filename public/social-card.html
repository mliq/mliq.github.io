<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Social Card</title>
  <style>
    :root{--bg:#0d1117;--surface:#161b22;--text:#c9d1d9;--muted:#8b949e;--blue:#82aaff;--purple:#c792ea}
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    .frame{width:1200px;height:630px;display:flex;align-items:center;justify-content:space-between;padding:48px;background:linear-gradient(135deg,rgba(199,146,234,.12),rgba(130,170,255,.08)),var(--bg)}
    .left{display:flex;align-items:center;gap:28px}
    .avatar{width:180px;height:180px;border-radius:18px;object-fit:cover;border:2px solid #30363d;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .title{display:flex;flex-direction:column}
    h1{margin:0 0 10px;font-size:56px;line-height:1.1;color:#e6eef6}
    p{margin:0;color:var(--muted);font-size:26px;max-width:700px}
    .right{width:420px;height:100%;display:flex;align-items:center;justify-content:center}
    .preview{width:420px;height:420px;border-radius:16px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.45);border:1px solid #232a33;background:#0f141a;display:flex;align-items:center;justify-content:center}
    .preview img{width:100%;height:100%;object-fit:cover}
  </style>
</head>
<body>
  <div class="frame">
    <div class="left">
      <img class="avatar" src="img/michael-headshot-header.webp" alt="Michael Liquori" />
      <div class="title">
        <h1>Michael Liquori</h1>
        <p>Fast, accessible UIs · AI enablement · Testing modernization · Performance</p>
      </div>
    </div>
    <div class="right">
      <div class="preview">
        <img src="img/petfinder-demo/cover.png" alt="Petfinder preview" />
      </div>
    </div>
  </div>
</body>
</html>
